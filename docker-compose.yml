version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: checkout-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: checkout_db
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkout_user -d checkout_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servidor WireMock simulando o serviço de pagamento
  # Acessível em http://localhost:8081
  payment-service:
    image: wiremock/wiremock:latest
    container_name: payment-service-mock
    ports:
      - "8081:8080" # porta-do-seu-pc:porta-dentro-do-container
    volumes:
      - ./wiremock/payment:/home/wiremock # mapeia os arquivos de mock locais para dentro do container
    command: ["--global-response-templating", "--verbose"]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/__admin/mappings",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Servidor WireMock simulando o serviço de estoque (inventory)
  # Acessível em http://localhost:8082
  inventory-service:
    image: wiremock/wiremock:latest
    container_name: inventory-service-mock
    ports:
      - "8082:8080"
    volumes:
      - ./wiremock/inventory:/home/wiremock
    command: ["--global-response-templating", "--verbose"]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/__admin/mappings",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Servidor WireMock simulando o serviço de pedidos (order)
  # Acessível em http://localhost:8083
  order-service:
    image: wiremock/wiremock:latest
    container_name: order-service-mock
    ports:
      - "8083:8080"
    volumes:
      - ./wiremock/order:/home/wiremock
    command: ["--global-response-templating", "--verbose"]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/__admin/mappings",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
